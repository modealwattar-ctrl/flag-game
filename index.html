<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Flag Fortune Wheel</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }
        h1 {
            color: #38bdf8;
            margin-bottom: 5px;
            font-size: 1.8rem;
            text-align: center;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.3);
        }
        .subtitle {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }
        .wheel-container {
            position: relative;
            margin: 10px 0;
        }
        #wheel {
            width: 240px;
            height: 240px;
            border-radius: 50%;
            border: 6px solid #38bdf8;
            box-shadow: 0 0 25px rgba(56, 189, 248, 0.4);
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.2, 1);
            background: conic-gradient(
                #0284c7 0deg 45deg, #1e293b 45deg 90deg,
                #0ea5e9 90deg 135deg, #334155 135deg 180deg,
                #0284c7 180deg 225deg, #1e293b 225deg 270deg,
                #0ea5e9 270deg 315deg, #334155 315deg 360deg
            );
        }
        #spin-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 65px;
            height: 65px;
            background: #f8fafc;
            color: #0f172a;
            border: none;
            border-radius: 50%;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            font-size: 0.9rem;
            letter-spacing: 1px;
        }
        .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 25px solid #38bdf8;
            z-index: 10;
        }
        .flag-display {
            font-size: 5.5rem;
            margin: 15px 0;
            height: 110px;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }
        .search-container {
            position: relative;
            width: 100%;
            max-width: 340px;
        }
        #country-input {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 2px solid #334155;
            background-color: #1e293b;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s;
        }
        #country-input:focus {
            border-color: #38bdf8;
        }
        .suggestions-list {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            max-height: 220px;
            overflow-y: auto;
            background-color: #1e293b;
            border: 2px solid #334155;
            border-top: none;
            border-radius: 0 0 10px 10px;
            z-index: 100;
            margin: 0;
            padding: 0;
            list-style: none;
            display: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }
        .suggestions-list li {
            padding: 12px 15px;
            cursor: pointer;
            border-bottom: 1px solid #334155;
            transition: background 0.2s;
            display: flex;
            justify-content: space-between;
        }
        .suggestions-list li:hover {
            background-color: #38bdf8;
            color: #0f172a;
        }
        #result-msg {
            margin-top: 20px;
            font-size: 1.3rem;
            font-weight: bold;
            text-align: center;
            height: 35px;
        }
    </style>
</head>
<body>

    </div>

        // ترتيب تلقائي وصارم من A لـ Z منعاً لأي خطأ يدوي
        const sortedCountries = [...countries].sort((a, b) => a.name.localeCompare(b.name));

        let selectedCountry = null;
        let isSpinning = false;
        let currentRotation = 0;

        const wheel = document.getElementById('wheel');
        const spinBtn = document.getElementById('spin-btn');
        const flagBox = document.getElementById('flag-box');
        const countryInput = document.getElementById('country-input');
        const suggestionsUl = document.getElementById('suggestions');
        const resultMsg = document.getElementById('result-msg');

        // عند تدوير الدولاب
        spinBtn.addEventListener('click', () => {
            if (isSpinning) return;
            
            isSpinning = true;
            resultMsg.innerText = "";
            flagBox.innerText = "❓";
            countryInput.value = "";
            
            // إضافة دورة عشوائية كبيرة فوق الزاوية الحالية لضمان استمرار الدوران بسلاسة
            const randomDegree = Math.floor(Math.random() * 2500) + 2000;
            currentRotation += randomDegree;
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                isSpinning = false;
                // اختيار بلد عشوائي من الـ 244 دولة
                const randomIndex = Math.floor(Math.random() * countries.length);
                selectedCountry = countries[randomIndex];
                
                flagBox.innerText = selectedCountry.flag;
                resultMsg.style.color = "#38bdf8";
                resultMsg.innerText = "What country is this? 🤔";
            }, 4000);
        });

        // تشغيل نظام الاقتراحات الذكي والترتيب
        countryInput.addEventListener('focus', showSuggestions);
        countryInput.addEventListener('input', showSuggestions);

        function showSuggestions() {
            const query = countryInput.value.toLowerCase().trim();
            suggestionsUl.innerHTML = "";
            suggestionsUl.style.display = "block";

            let filtered = sortedCountries;

            // إذا كتب المستخدم، نقوم بفلترة النتائج التي تبدأ أو تحتوي على الحرف
            if (query !== "") {
                filtered = sortedCountries.filter(c => c.name.toLowerCase().includes(query));
            }

            if (filtered.length === 0) {
                const li = document.createElement('li');
                li.innerText = "No matching countries";
                li.style.color = "#94a3b8";
                suggestionsUl.appendChild(li);
                return;
            }

            // توليد القائمة المرتبة أبجدياً
            filtered.forEach(country => {
                const li = document.createElement('li');
                li.innerHTML = `<span>${country.name}</span> <span style="opacity: 0.6">${country.flag}</span>`;
                li.addEventListener('click', () => {
                    countryInput.value = country.name;
                    suggestionsUl.style.display = "none";
                    checkAnswer(country.name);
                });
                suggestionsUl.appendChild(li);
            });
        }

        // إغلاق القائمة عند الضغط بمكان خارجي لسهولة الاستخدام على الموبايل
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.search-container')) {
                suggestionsUl.style.display = "none";
            }
        });

        // فحص التخمين
        function checkAnswer(guessedName) {
            if (!selectedCountry) {
                resultMsg.style.color = "#ef4444";
                resultMsg.innerText = "Spin the wheel first! 🎡";
                return;
            }

            if (guessedName.toLowerCase() === selectedCountry.name.toLowerCase()) {
                resultMsg.style.color = "#4ade80";
                resultMsg.innerText = `Correct! It's ${selectedCountry.name} 🎉`;
            } else {
                resultMsg.style.color = "#ef4444";
                resultMsg.innerText = "Wrong country! Try another one ❌";
            }
        }
    </script>
